services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tj-pos-backend
    command: pnpm exec ts-node -r tsconfig-paths/register src/main.ts
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-tj_pos}:${POSTGRES_PASSWORD:-tj_pos}@postgres:5432/${POSTGRES_DB:-tj_pos}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: tj-pos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tj_pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tj_pos}
      POSTGRES_DB: ${POSTGRES_DB:-tj_pos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tj_pos} -d ${POSTGRES_DB:-tj_pos}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  backend_node_modules:
  postgres_data:
