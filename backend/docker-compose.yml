services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tj-pos-backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tj-pos-cloudflared
    restart: unless-stopped
    env_file:
      - ${TUNNEL_ENV_FILE:-.env.tunnel}
    command: tunnel --no-autoupdate run
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_uploads:
